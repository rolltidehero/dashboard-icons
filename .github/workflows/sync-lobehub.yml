name: Sync LobeHub icons

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: cd web && pnpm install --frozen-lockfile

      - name: Fetch LobeHub manifest
        run: |
          cd web
          mkdir -p data/sources/lobehub
          curl -fsSL "https://api.github.com/repos/lobehub/lobe-icons/git/trees/master?recursive=1" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -o data/sources/lobehub/icons.json

      - name: Import external icons
        env:
          NEXT_PUBLIC_POCKETBASE_URL: ${{ secrets.PB_URL }}
          PB_ADMIN: ${{ secrets.PB_ADMIN }}
          PB_ADMIN_PASS: ${{ secrets.PB_ADMIN_PASS }}
        run: cd web && pnpm exec tsx scripts/import-lobehub.ts
